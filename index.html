<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2>Controle de KM</h2>

    <form id="formKm">
        <label>Motorista</label>
        <input type="text" id="Motorista" required>

        <label>Data </label>
        <input type="date" id="Data" required>

        <label>KM inicial</label>
        <input type="number" id="KMinicial" required>

        <label>KM Final</label>
        <input type="number" id="KMfinal">

        <h3>Assiantura do Motorista</h3>
        <canvas id="Assiantura" width="400" height="152"></canvas>
        <button type="button" onclick="limparAssinatura()">Limpar Assinatura</button>

        <button type="submit">Salvar registro</button>
    </form>
    <h3>registro Salvo</h3>
    <table id="tabela">
        <thead>
            <tr>
                <th>Motorista</th>
                <th>Data</th>
                <th>KM inicial</th>
                <th>KM final</th>
                <th>Total Rodado</th>
            </tr>
        </thead>
    </table>

    <script src="script.js"></script>
</body>
</html>
