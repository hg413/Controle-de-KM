<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle KM — Login</title>
  <meta name="description" content="Sistema de controle de quilometragem de veículos da frota." />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-circle">🚗</div>
        <h1>Controle KM</h1>
        <p>Gestão de frota — Faça login para continuar</p>
      </div>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-control" type="email" id="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input class="form-control" type="password" id="senha" placeholder="••••••••" required />
        </div>
        <button type="submit" class="login-btn" id="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script>
    // Se logado, redireciona
    const u = Auth.get();
    if (u) {
      location.href = u.perfil === 'admin' ? 'admin/index.html' : 'motorista/index.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const btn = document.querySelector('.login-btn');

      btn.classList.add('loading');
      btn.disabled = true;

      const { ok, data } = await Api.login(email, senha);

      if (ok && data.usuario) {
        Auth.save(data.usuario);
        location.href = data.usuario.perfil === 'admin' ? 'admin/index.html' : 'motorista/index.html';
      } else {
        document.getElementById('login-error').textContent = data.message || 'Erro ao entrar. Verifique seus dados.';
      }

      btn.classList.remove('loading');
      btn.disabled = false;
    });
  </script>
</body>

</html>
