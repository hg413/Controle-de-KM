<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Diário | Controle KM</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group.full { grid-column: span 2; }
    .signature-container {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      margin-top: 8px;
    }
    canvas#assinatura {
      width: 100%; height: 160px;
      cursor: crosshair; border-radius: var(--radius); display: block;
    }
    .signature-actions { margin-top: 8px; }
    .btn-clear {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 13px; padding: 4px 8px;
    }
    .btn-clear:hover { text-decoration: underline; }
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🚗</div>
        <div class="logo-text">Controle KM<span>Painel Motorista</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Principal</div>
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Início</a>
        <a href="registro_diario.html" class="nav-item active"><span class="nav-icon">📋</span> Registro Diário</a>
        <div class="sidebar-section-label">Frota</div>
        <a href="abastecimentos.html" class="nav-item"><span class="nav-icon">⛽</span> Abastecimentos</a>
        <a href="manutencoes.html" class="nav-item"><span class="nav-icon">🔧</span> Manutenções</a>
        <a href="ocorrencias.html" class="nav-item"><span class="nav-icon">⚠️</span> Ocorrências</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">M</div>
          <div class="user-details">
            <div class="user-name" id="sidebar-nome">Carregando...</div>
            <div class="user-role" id="sidebar-role">Motorista</div>
          </div>
          <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Registro Diário de Uso</h1>
        <p class="page-subtitle">Informe o trajeto realizado hoje</p>
      </div>

      <!-- Formulário Direto na Tela -->
      <div class="form-card">
        <form id="form-registro-diario">
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Veículo</label>
              <select class="form-control" id="rd-veiculo" required></select>
            </div>
            <div class="form-group">
              <label class="form-label">Motorista</label>
              <select class="form-control" id="rd-motorista" required></select>
            </div>
            <div class="form-group">
              <label class="form-label">Data</label>
              <input class="form-control" type="date" id="rd-data" required />
            </div>
            <div class="form-group">
              <label class="form-label">Hora Início</label>
              <input class="form-control" type="time" id="rd-hora-inicio" required />
            </div>
            <div class="form-group">
              <label class="form-label">Hora Final</label>
              <input class="form-control" type="time" id="rd-hora-final" required />
            </div>
            <div class="form-group">
              <label class="form-label">KM Inicial</label>
              <input class="form-control" type="number" id="rd-km-inicial" placeholder="Ex: 50000" min="0" required />
            </div>
            <div class="form-group">
              <label class="form-label">KM Final</label>
              <input class="form-control" type="number" id="rd-km-final" placeholder="Ex: 50120" min="0" required />
            </div>
            <div class="form-group">
              <label class="form-label">KM Rodado</label>
              <div class="km-rodado-display" id="rd-km-rodado-wrapper">
                <span class="km-rodado-icon">🛣️</span>
                <span class="km-rodado-value" id="rd-km-rodado">0 km</span>
              </div>
              <input type="hidden" id="rd-km-rodado-val" value="0" />
            </div>
            <div class="form-group full">
              <label class="form-label">Destino / Motivo</label>
              <textarea class="form-control" id="rd-motivo" placeholder="Descreva o trajeto realizado..." rows="3" required></textarea>
            </div>
            <div class="form-group full">
              <label class="form-label">Assinatura Digital</label>
              <div class="signature-container">
                <canvas id="assinatura"></canvas>
              </div>
              <div class="signature-actions">
                <button type="button" class="btn-clear" id="limpar-assinatura">↺ Limpar assinatura</button>
              </div>
            </div>
          </div>
          <div style="display:flex; justify-content:flex-end; margin-top:24px;">
            <button type="submit" class="btn btn-primary" id="btn-salvar">Salvar Registro</button>
          </div>
        </form>
      </div>

      <div class="table-card" style="margin-top: 24px;">
        <div class="table-header">
          <span class="table-title">Minhas Viagens</span>
        </div>
        <div id="tabela-wrapper">
          <div class="empty-state">⏳ Carregando...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js?v=4"></script>
  <script src="../js/auth.js?v=4"></script>
  <script src="../js/registro_diario.js?v=4"></script>
  <script>
    const u = Auth.require('motorista');
    if (u) { preencherSidebar(u); initMobileMenu(); initRegistroDiario(); }
  </script>
</body>
</html>
