<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Motorista | Controle KM</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🚗</div>
        <div class="logo-text">Controle KM<span>Painel Motorista</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Principal</div>
        <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span> Início</a>
        <div class="sidebar-section-label">Frota</div>
        <a href="abastecimentos.html" class="nav-item"><span class="nav-icon">⛽</span> Abastecimentos</a>
        <a href="manutencoes.html" class="nav-item"><span class="nav-icon">🔧</span> Manutenções</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">M</div>
          <div class="user-details">
            <div class="user-name" id="sidebar-nome">Carregando...</div>
            <div class="user-role" id="sidebar-role">Motorista</div>
          </div>
          <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Olá, <span id="nome-motorista">Motorista</span>! 👋</h1>
        <p class="page-subtitle" id="data-hoje"></p>
      </div>

      <div class="cards-grid">
        <div class="card" style="cursor:pointer;border-color:var(--accent)"
          onclick="alert('Em breve: Registro de Viagem')">
          <div class="card-icon">📋</div>
          <div class="card-label">Ação</div>
          <div style="font-size:16px;font-weight:600;margin-top:4px;">Registrar Viagem</div>
        </div>
        <div class="card" style="cursor:pointer" onclick="location.href='abastecimentos.html'">
          <div class="card-icon">⛽</div>
          <div class="card-label">Ação</div>
          <div style="font-size:16px;font-weight:600;margin-top:4px;">Registrar Abastecimento</div>
        </div>
        <div class="card" style="cursor:pointer" onclick="location.href='manutencoes.html'">
          <div class="card-icon">🔧</div>
          <div class="card-label">Ação</div>
          <div style="font-size:16px;font-weight:600;margin-top:4px;">Registrar Manutenção</div>
        </div>
        <div class="card" style="cursor:pointer" onclick="alert('Em breve: Ocorrência')">
          <div class="card-icon">⚠️</div>
          <div class="card-label">Ação</div>
          <div style="font-size:16px;font-weight:600;margin-top:4px;">Registrar Ocorrência</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Últimas Viagens</span>
        </div>
        <div class="empty-state">
          <div class="empty-icon">🛣️</div>
          <p>Nenhuma viagem registrada ainda.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const usuario = Auth.require('motorista');
    if (usuario) {
      preencherSidebar(usuario);
      initMobileMenu();
      document.getElementById('nome-motorista').textContent = usuario.nome.split(' ')[0];

      const hoje = new Date().toLocaleDateString('pt-BR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
      document.getElementById('data-hoje').textContent = hoje.charAt(0).toUpperCase() + hoje.slice(1);
    }
  </script>
</body>

</html>
